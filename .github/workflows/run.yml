name: News Bot

on:
  schedule:
    - cron: '50 6 * * *' # 한국시간 오후 3시
  workflow_dispatch: # 수동 실행 버튼 생성

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: 파이썬 설치
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: 라이브러리 설치
        run: pip install feedparser newspaper3k googlenewsdecoder
      - name: 코드 실행
        run: python a.py
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
