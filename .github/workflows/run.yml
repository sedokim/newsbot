name: News Bot

on:
  schedule:
    - cron: '56 6 * * *' # UTC 06:56 (한국시간 오후 3시 56분)
  workflow_dispatch: # 수동 실행 버튼 생성

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: 체크아웃
        uses: actions/checkout@v3

      - name: 파이썬 설치
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          cache: 'pip' # 캐시를 사용하면 다음 실행부터 속도가 빨라집니다.

      - name: 라이브러리 설치
        run: |
          python -m pip install --upgrade pip
          pip install feedparser newspaper3k googlenewsdecoder lxml_html_clean schedule

      - name: 코드 실행
        run: python a.py
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
